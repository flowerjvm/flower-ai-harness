name: build

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout flower-ai-harness
        uses: actions/checkout@v4
        with:
          path: flower-ai-harness

      - name: Checkout Flower
        uses: actions/checkout@v4
        with:
          repository: parkKevinSB/flower
          path: flower

      - name: Checkout Bloom
        uses: actions/checkout@v4
        with:
          repository: parkkevinsb/bloom
          path: bloom

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Bloom snapshot
        run: mvn -B -f bloom/pom.xml install -DskipTests

      - name: Install Flower snapshot
        run: mvn -B -f flower/pom.xml install -DskipTests

      - name: Verify
        run: mvn -B -f flower-ai-harness/pom.xml verify
