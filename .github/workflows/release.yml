name: Publish Release to Maven Central

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version already committed in pom.xml (for example, 0.1.0)
        required: true
        type: string
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: maven-central-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check required release secrets
        shell: bash
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          missing=0
          for name in CENTRAL_TOKEN_USERNAME CENTRAL_TOKEN_PASSWORD MAVEN_GPG_PRIVATE_KEY MAVEN_GPG_PASSPHRASE; do
            if [ -z "${!name}" ]; then
              echo "Missing required GitHub Actions secret: ${name}" >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up Java, Maven Central credentials, and GPG
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Resolve and validate release version
        id: release-version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            release_version="${RELEASE_TAG#v}"
          else
            release_version="$REQUESTED_VERSION"
          fi

          if [[ ! "$release_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release version must be a non-SNAPSHOT semantic version: $release_version" >&2
            exit 1
          fi

          pom_version="$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [ "$pom_version" != "$release_version" ]; then
            echo "pom.xml version ($pom_version) does not match release version ($release_version)." >&2
            exit 1
          fi

          echo "version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Build, sign, and publish ${{ steps.release-version.outputs.version }}
        run: mvn -B -ntp -Prelease clean deploy
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
