name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pom.xml
      - flower-ai-harness-*/**
      - examples/**
      - config/**
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - pom.xml
      - flower-ai-harness-*/**
      - examples/**
      - config/**
      - .github/workflows/ci.yml

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Verify
        run: mvn -B -ntp clean verify

      - name: Check agent runner examples
        working-directory: examples/agent-cli-runners
        run: npm run check
